name: Build release assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to package'
        required: false

permissions:
  contents: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Install frontend dependencies
        run: npm install
      - name: Run tests
        run: python -m pytest -q
      - name: Build local app
        run: VITE_APP_VERSION="${{ github.event.inputs.version || github.ref_name }}" npm run build
      - name: Package release asset
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          rm -rf dist-release
          scripts/package-release.sh "$VERSION" --skip-build
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/BODR-Image-Prompt-${{ github.event.inputs.version || github.ref_name }}.tar.gz
            dist-release/BODR-Image-Prompt-${{ github.event.inputs.version || github.ref_name }}.tar.gz.sha256
            dist-release/BODR-Image-Prompt-${{ github.event.inputs.version || github.ref_name }}.manifest.json
