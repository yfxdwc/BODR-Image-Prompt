name: Deploy GitHub Pages demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LEGACY_DEMO_REF: v0.1.0-alpha
  LEGACY_DEMO_PATH: v0.1
  ARCHIVED_02_DEMO_REF: v0.2.0-alpha
  ARCHIVED_02_DEMO_PATH: v0.2
  ARCHIVED_03_DEMO_REF: v0.3.0-alpha
  ARCHIVED_03_DEMO_PATH: v0.3
  ARCHIVED_04_DEMO_REF: v0.4.0-alpha
  ARCHIVED_04_DEMO_PATH: v0.4
  ARCHIVED_06_DEMO_REF: v0.6.8-beta
  ARCHIVED_06_DEMO_PATH: v0.6
  CURRENT_PREVIEW_PATH: v0.7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build current v0.7 read-only preview
        run: VITE_DEMO_MODE=true VITE_BASE_PATH=/BODR-Image-Prompt/${CURRENT_PREVIEW_PATH}/ npm run build
      - name: Stage current v0.7 read-only preview
        run: |
          mkdir -p .pages-artifact/${CURRENT_PREVIEW_PATH}
          cp -R frontend/dist/. .pages-artifact/${CURRENT_PREVIEW_PATH}/
      - name: Build archived v0.6 preview
        run: |
          git fetch --tags origin
          git worktree add .page-build/${ARCHIVED_06_DEMO_PATH} ${ARCHIVED_06_DEMO_REF}
          cd .page-build/${ARCHIVED_06_DEMO_PATH}
          npm install
          VITE_DEMO_MODE=true VITE_BASE_PATH=/BODR-Image-Prompt/${ARCHIVED_06_DEMO_PATH}/ npm run build
      - name: Stage archived v0.6 preview
        run: |
          mkdir -p .pages-artifact/${ARCHIVED_06_DEMO_PATH}
          cp -R .page-build/${ARCHIVED_06_DEMO_PATH}/frontend/dist/. .pages-artifact/${ARCHIVED_06_DEMO_PATH}/
      - name: Build archived v0.4 preview
        run: |
          git fetch --tags origin
          git worktree add .page-build/${ARCHIVED_04_DEMO_PATH} ${ARCHIVED_04_DEMO_REF}
          cd .page-build/${ARCHIVED_04_DEMO_PATH}
          npm install
          VITE_DEMO_MODE=true VITE_BASE_PATH=/BODR-Image-Prompt/${ARCHIVED_04_DEMO_PATH}/ npm run build
      - name: Stage archived v0.4 preview
        run: |
          mkdir -p .pages-artifact/${ARCHIVED_04_DEMO_PATH}
          cp -R .page-build/${ARCHIVED_04_DEMO_PATH}/frontend/dist/. .pages-artifact/${ARCHIVED_04_DEMO_PATH}/
      - name: Build archived v0.3 preview
        run: |
          git fetch --tags origin
          git worktree add .page-build/${ARCHIVED_03_DEMO_PATH} ${ARCHIVED_03_DEMO_REF}
          cd .page-build/${ARCHIVED_03_DEMO_PATH}
          npm install
          VITE_DEMO_MODE=true VITE_BASE_PATH=/BODR-Image-Prompt/${ARCHIVED_03_DEMO_PATH}/ npm run build
      - name: Stage archived v0.3 preview
        run: |
          mkdir -p .pages-artifact/${ARCHIVED_03_DEMO_PATH}
          cp -R .page-build/${ARCHIVED_03_DEMO_PATH}/frontend/dist/. .pages-artifact/${ARCHIVED_03_DEMO_PATH}/
      - name: Inject v0.4 upgrade notice into archived v0.3 preview
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path('.pages-artifact/v0.3/index.html')
          html = index_path.read_text(encoding='utf-8')
          notice = r'''
          <script>
            (() => {
              const storageKey = 'BODR-Image-Prompt-hide-v03-upgrade';
              if (localStorage.getItem('BODR-Image-Prompt-hide-v03-upgrade') === '1') return;

              const overlay = document.createElement('div');
              overlay.setAttribute('role', 'dialog');
              overlay.setAttribute('aria-modal', 'true');
              overlay.setAttribute('aria-label', 'v0.4 upgrade notice');
              overlay.innerHTML = `
                <style>
                  .ipl-v03-upgrade-overlay {
                    position: fixed;
                    inset: 0;
                    z-index: 9999;
                    display: grid;
                    place-items: center;
                    padding: 20px;
                    background: rgba(25, 18, 31, .48);
                    backdrop-filter: blur(5px);
                  }
                  .ipl-v03-upgrade-card {
                    width: min(460px, 100%);
                    border: 1px solid rgba(109, 74, 255, .24);
                    border-radius: 24px;
                    padding: 24px;
                    color: #2c2230;
                    background: #fffaf7;
                    box-shadow: 0 28px 80px rgba(25, 18, 31, .24);
                    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  }
                  .ipl-v03-upgrade-card h2 {
                    margin: 0 0 10px;
                    font-size: 24px;
                    line-height: 1.15;
                    letter-spacing: -.03em;
                  }
                  .ipl-v03-upgrade-card p {
                    margin: 0 0 18px;
                    color: #655b68;
                    line-height: 1.55;
                  }
                  .ipl-v03-upgrade-actions {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 10px;
                  }
                  .ipl-v03-upgrade-actions a,
                  .ipl-v03-upgrade-actions button {
                    border: 0;
                    border-radius: 999px;
                    padding: 11px 15px;
                    font: inherit;
                    font-weight: 800;
                    cursor: pointer;
                  }
                  .ipl-v03-upgrade-actions a {
                    color: #fff;
                    background: #6d4aff;
                    text-decoration: none;
                  }
                  .ipl-v03-upgrade-actions button {
                    color: #5d5260;
                    background: #f0e9e2;
                  }
                </style>
                <div class="ipl-v03-upgrade-overlay">
                  <section class="ipl-v03-upgrade-card">
                    <h2>This v0.3 preview is archived.</h2>
                    <p>Latest v0.4 has the current Online Read Only Demo and points local installs to ChatGPT OAuth direct image generation.</p>
                    <div class="ipl-v03-upgrade-actions">
                      <a href="/BODR-Image-Prompt/v0.4/">Go to the latest v0.4 demo</a>
                      <button type="button" data-close>Stay on v0.3</button>
                    </div>
                  </section>
                </div>
              `;
              overlay.querySelector('[data-close]').addEventListener('click', () => {
                localStorage.setItem(storageKey, '1');
                overlay.remove();
              });
              document.addEventListener('DOMContentLoaded', () => document.body.appendChild(overlay));
            })();
          </script>
          '''
          if notice in html:
              raise SystemExit('v0.3 upgrade notice already injected')
          if '</body>' not in html:
              raise SystemExit('Cannot inject v0.3 upgrade notice: </body> missing')
          index_path.write_text(html.replace('</body>', notice + '\n</body>'), encoding='utf-8')
          PY
      - name: Build archived v0.2 preview
        run: |
          git fetch --tags origin
          git worktree add .page-build/${ARCHIVED_02_DEMO_PATH} ${ARCHIVED_02_DEMO_REF}
          cd .page-build/${ARCHIVED_02_DEMO_PATH}
          npm install
          VITE_DEMO_MODE=true VITE_BASE_PATH=/BODR-Image-Prompt/${ARCHIVED_02_DEMO_PATH}/ npm run build
      - name: Stage archived v0.2 preview
        run: |
          mkdir -p .pages-artifact/${ARCHIVED_02_DEMO_PATH}
          cp -R .page-build/${ARCHIVED_02_DEMO_PATH}/frontend/dist/. .pages-artifact/${ARCHIVED_02_DEMO_PATH}/
      - name: Build archived v0.1 demo
        run: |
          git fetch --tags origin
          git worktree add .page-build/${LEGACY_DEMO_PATH} ${LEGACY_DEMO_REF}
          cd .page-build/${LEGACY_DEMO_PATH}
          npm install
          VITE_DEMO_MODE=true VITE_BASE_PATH=/BODR-Image-Prompt/${LEGACY_DEMO_PATH}/ npm run build
      - name: Stage archived v0.1 demo
        run: |
          mkdir -p .pages-artifact/${LEGACY_DEMO_PATH}
          cp -R .page-build/${LEGACY_DEMO_PATH}/frontend/dist/. .pages-artifact/${LEGACY_DEMO_PATH}/
      - name: Write version chooser landing page
        run: |
          mkdir -p .pages-artifact/assets
          cp docs/assets/screenshots/local-generation-studio-banner-v0.7.png .pages-artifact/assets/local-generation-studio-banner-v0.7.png
          cat > .pages-artifact/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>BODR Image Prompt demos</title>
              <style>
                :root {
                  color: #2c2230;
                  background: #faf9f4;
                  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }
                body {
                  min-height: 100vh;
                  margin: 0;
                  display: grid;
                  place-items: center;
                  padding: 32px;
                  background:
                    radial-gradient(circle at top left, rgba(109, 74, 255, .16), transparent 34vw),
                    linear-gradient(135deg, #fffaf0, #f4f0ff 52%, #faf9f4);
                }
                main {
                  width: min(1080px, 100%);
                  background: rgba(255, 255, 255, .82);
                  border: 1px solid rgba(99, 80, 64, .12);
                  border-radius: 32px;
                  box-shadow: 0 28px 80px rgba(44, 34, 48, .14);
                  padding: clamp(28px, 5vw, 56px);
                }
                .eyebrow {
                  margin: 0 0 12px;
                  color: #6d4aff;
                  font-size: 13px;
                  font-weight: 800;
                  letter-spacing: .14em;
                  text-transform: uppercase;
                }
                h1 {
                  margin: 0;
                  font-size: clamp(36px, 7vw, 72px);
                  line-height: .95;
                  letter-spacing: -.06em;
                }
                .intro {
                  max-width: 680px;
                  margin: 22px 0 18px;
                  color: #6c5f6f;
                  font-size: clamp(17px, 2.4vw, 21px);
                  line-height: 1.6;
                }
                .local-banner {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 10px;
                  align-items: center;
                  margin: 0 0 32px;
                  padding: 14px 16px;
                  border: 1px solid rgba(109, 74, 255, .2);
                  border-radius: 18px;
                  background: rgba(238, 232, 255, .72);
                  color: #4d31d8;
                  font-size: 14px;
                  font-weight: 700;
                }
                .local-banner a {
                  color: #2c1aa6;
                  font-weight: 900;
                }
                .hero-banner-link {
                  display: block;
                  margin: 0 0 30px;
                  border-radius: 26px;
                  box-shadow: 0 24px 62px rgba(44, 34, 48, .16);
                  overflow: hidden;
                  transition: transform .18s ease, box-shadow .18s ease;
                }
                .hero-banner-link:hover,
                .hero-banner-link:focus-visible {
                  transform: translateY(-2px);
                  box-shadow: 0 30px 72px rgba(44, 34, 48, .2);
                  outline: none;
                }
                .hero-banner {
                  display: block;
                  width: 100%;
                  height: auto;
                }
                .versions {
                  display: grid;
                  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                  gap: 16px;
                }
                a.version-card {
                  display: block;
                  min-height: 170px;
                  padding: 24px;
                  color: inherit;
                  text-decoration: none;
                  background: #fff;
                  border: 1px solid rgba(44, 34, 48, .1);
                  border-radius: 24px;
                  box-shadow: 0 18px 42px rgba(44, 34, 48, .08);
                  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
                }
                a.version-card:hover,
                a.version-card:focus-visible {
                  transform: translateY(-3px);
                  border-color: rgba(109, 74, 255, .34);
                  box-shadow: 0 22px 52px rgba(44, 34, 48, .14);
                  outline: none;
                }
                .version-label {
                  display: inline-flex;
                  align-items: center;
                  border-radius: 999px;
                  padding: 6px 10px;
                  background: #eee8ff;
                  color: #4d31d8;
                  font-size: 12px;
                  font-weight: 800;
                }
                h2 {
                  margin: 18px 0 10px;
                  font-size: 26px;
                  letter-spacing: -.03em;
                }
                p {
                  margin: 0;
                  color: #756976;
                  line-height: 1.55;
                }
                .stable .version-label {
                  background: #f1eadf;
                  color: #655442;
                }
              </style>
            </head>
            <body>
              <main>
                <p class="eyebrow">BODR Image Prompt</p>
                <h1>Online Read Only Demo</h1>
                <p class="intro">
                  Browse public sample prompts and preview images.
                  Add/edit/generation require local install; run locally to create your private prompt library.
                </p>
                <p class="local-banner">
                  <span>Latest v0.7 beta adds safer queue recovery and failed-job retry. Online demo remains read-only.</span>
                  <a href="https://github.com/EddieTYP/BODR-Image-Prompt">View on GitHub</a>
                </p>
                <a class="hero-banner-link" href="https://github.com/EddieTYP/BODR-Image-Prompt/releases/tag/v0.7.3-beta" aria-label="View the v0.7.3 beta Safer Queue Recovery release">
                  <img class="hero-banner" src="./assets/local-generation-studio-banner-v0.7.png" width="2172" height="724" alt="BODR Image Prompt v0.7.3-beta Safer Queue Recovery banner showing the app Cards view and local generation workflow highlights" />
                </a>
                <section class="versions" aria-label="Demo versions">
                  <a class="version-card" href="./v0.7/">
                    <span class="version-label">Current demo · v0.7</span>
                    <h2>Online Read Only Demo plus local v0.7 beta banner</h2>
                    <p>Browse 533 multilingual references online. Install locally for prompt variables, ChatGPT image generation, Add/Edit, and your private prompt library.</p>
                  </a>
                  <a class="version-card stable" href="./v0.6/">
                    <span class="version-label">Archive · v0.6</span>
                    <h2>Mobile generation and bulk cleanup preview</h2>
                    <p>The archived v0.6 read-only preview is preserved for old public links and release notes.</p>
                  </a>
                  <a class="version-card stable" href="./v0.4/">
                    <span class="version-label">Archive · v0.4</span>
                    <h2>Local generation beta banner preview</h2>
                    <p>The archived read-only preview that introduced the local install path for ChatGPT OAuth generation and the versioned installer.</p>
                  </a>
                  <a class="version-card stable" href="./v0.3/">
                    <span class="version-label">Archive · v0.3</span>
                    <h2>Multilingual provenance-aware prompt vault</h2>
                    <p>Browse 510 references from two attributed sample sources with Origin, English, Traditional Chinese, and Simplified Chinese prompt variants.</p>
                  </a>
                  <a class="version-card stable" href="./v0.2/">
                    <span class="version-label">Archive · v0.2</span>
                    <h2>Archived 0.2 preview</h2>
                    <p>Mobile Cards browsing, two-column masonry, adaptive image display, compact mobile header, and selected-collection dock.</p>
                  </a>
                  <a class="version-card stable" href="./v0.1/">
                    <span class="version-label">Archive · v0.1</span>
                    <h2>Original alpha demo</h2>
                    <p>The first public read-only sandbox is preserved as a stable backup/reference.</p>
                  </a>
                </section>
              </main>
            </body>
          </html>
          HTML
          touch .pages-artifact/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
